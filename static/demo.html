<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RetroFin AI · Demo</title>
<script src="/static/react.production.min.js"></script>
<script src="/static/react-dom.production.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { margin: 0; font-family: 'DM Sans', sans-serif; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.75)} }
@keyframes dotBounce { 0%,80%,100%{transform:scale(.5);opacity:.4} 40%{transform:scale(1);opacity:1} }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: #c8e8dc; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="/static/demo.compiled.js"></script>
</body>
</html>
